<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- Página standalone para admins (paso 206): confirmación pública de aprobar/rechazar una
     cuenta desde el link firmado del mail de aviso (ver crear_perfil() en
     031_aprobar_desde_mail.sql). Sin sesión, sin localStorage, fuera del alcance del service
     worker (ver la exclusión en sw.js) — mismo criterio que portal.html. CSS propio, no depende
     de styles.css (cada archivo standalone de este repo duplica sus estilos, ver CLAUDE.md). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src https://*.supabase.co; base-uri 'none'; form-action 'none'; object-src 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Aprobar cuenta — Entreclases</title>
<style>
  :root{
    --bg:#F6F8FC; --card:#FFFFFF; --ink:#12192E; --muted:#5C6480; --faint:#8B90A0;
    --line:#E4E9F5; --soft:#EEF1F9; --red:#EF4444; --redbg:#FEE2E2; --red-fg:#A23A2A;
    --green:#22C55E; --green-fg:#15803D; --greenbg:#DCFCE7;
    --navy:#1E2B4D; --navy-2:#2F4272; --accent:#14B8A6; --accent-dark:#0E9488;
    --sans:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0F1420; --card:#1B2333; --ink:#EDEFF7; --muted:#A8ADBD; --faint:#7A8096;
      --line:#2B3348; --soft:#171D2C; --red:#FF6B6B; --redbg:#3A211D; --red-fg:#E8A093;
      --green:#4ADE80; --green-fg:#86EFAC; --greenbg:#123420;
      --navy:#2B3A63; --navy-2:#3D5089; --accent:#2DD4C0; --accent-dark:#14B8A6;
    }
  }
  *{box-sizing:border-box}
  a:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
       font-size:15px;line-height:1.5;padding:24px 16px 48px}
  .shell{max-width:420px;margin:0 auto}
  .brandhead{display:flex;align-items:center;gap:9px;margin-bottom:18px}
  .logo-mark{width:28px;height:28px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(135deg,var(--navy),var(--navy-2));
    display:flex;align-items:center;justify-content:center}
  .logo-mark svg{width:14px;height:14px;display:block}
  .brandhead b{font-weight:700;font-size:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px}
  .msg{text-align:center;padding:20px 8px}
  .msg .big{font-size:17px;font-weight:600;margin-bottom:8px}
  .msg .small{color:var(--muted);font-size:14px}
  .err{color:var(--red-fg);background:var(--redbg);border-radius:10px;padding:10px 14px;font-size:14px;margin-top:12px}
  .ok{color:var(--green-fg);background:var(--greenbg);border-radius:10px;padding:10px 14px;font-size:14px;margin-top:12px}
  .field{font-size:13px;color:var(--muted);margin-bottom:4px}
  .value{font-size:16px;font-weight:600;margin-bottom:14px}
  .btn{display:inline-flex;align-items:center;justify-content:center;width:100%;
    font:inherit;font-weight:700;font-size:15px;padding:12px 16px;border-radius:10px;border:none;cursor:pointer}
  .btn-aprobar{background:var(--accent-dark);color:#FFFFFF}
  .btn-rechazar{background:var(--red);color:#FFFFFF}
  .btn:disabled{opacity:.6;cursor:default}
  .panel-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--faint);text-decoration:underline}
</style>
</head>
<body>
<div class="shell">
  <div class="brandhead">
    <span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
    <b>Entreclases</b>
  </div>
  <div class="card" id="app">
    <div class="msg"><div class="big">Cargando…</div></div>
  </div>
</div>
<script src="js/aprobar.js"></script>
</body>
</html>
